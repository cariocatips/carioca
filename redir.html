<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Redirecionando...</title>
</head>
<body>
<script>
(function() {
  const urlParams = new URLSearchParams(window.location.search);

  // Salva UTMs
  const utms = {
    utm_source: urlParams.get("utm_source"),
    utm_medium: urlParams.get("utm_medium"),
    utm_campaign: urlParams.get("utm_campaign"),
    utm_content: urlParams.get("utm_content"),
    utm_term: urlParams.get("utm_term"),
    utm_id: urlParams.get("utm_id"),
    ad_id: urlParams.get("ad_id"),
    adset_id: urlParams.get("adset_id")
  };

  localStorage.setItem("utms", JSON.stringify(utms));

  // Dispara evento Lead (Pixel)
  if (typeof fbq !== "undefined") {
    fbq('track', 'Lead', utms);
  }

  // Envia pro backend (CAPI)
  fetch("https://metaa.onrender.com", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      event_name: "Lead",
      event_time: Math.floor(Date.now() / 1000),
      utms: utms,
      user_agent: navigator.userAgent
    })
  });

  // Redireciona mantendo UTMs
  setTimeout(() => {
    window.location.href = "https://t.me/+9GNQE3eux3hmNTRh" + window.location.search;
  }, 600);

})();
</script>
</body>
</html>
